<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>頼朝くん 〜かまくらものしり問答〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Maru+Gothic:wght@500;700;900&family=Klee+One:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --sumi:#0e1626;        /* 紺墨（こい藍） */
    --sumi2:#16223a;
    --hata:#dfe7f1;        /* 白旗（しろ） */
    --hata-akarui:#f3f7fc;
    --ai:#2c5390;          /* 藍 */
    --ai-akarui:#5a82c0;
    --aka:#9c3b35;         /* 朱（さし色） */
    --aka-fuka:#6f2722;
    --washi:#f4ead6;       /* 和紙 */
    --washi-kage:#e7d8ba;
    --moegi:#6f8a4a;
    --sumi-usu:rgba(223,231,241,.7);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Zen Maru Gothic',sans-serif;
    background:
      radial-gradient(ellipse at 50% -10%, #20335a 0%, transparent 55%),
      radial-gradient(ellipse at 50% 120%, #12203a 0%, transparent 55%),
      var(--sumi);
    color:var(--hata);
    min-height:100%;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
    position:relative;
  }
  /* 和紙テクスチャ風のノイズ */
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px);
    pointer-events:none;z-index:0;
  }

  /* ヘッダー（のぼり旗風） */
  header{
    position:relative;z-index:2;
    text-align:center;
    padding:18px 16px 10px;
    border-bottom:3px solid var(--ai);
    background:linear-gradient(180deg, rgba(44,83,144,.40), transparent);
  }
  .mon{
    display:inline-flex;align-items:center;gap:14px;
  }
  .mon-maru{
    width:46px;height:46px;border-radius:50%;
    border:3px solid var(--hata);
    display:grid;place-items:center;
    font-family:'Yuji Syuku',serif;font-size:24px;color:var(--hata-akarui);
    background:radial-gradient(circle,#20335a,#0e1626);
  }
  h1{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(28px,4.2vw,52px);
    color:var(--hata-akarui);
    letter-spacing:.12em;
    text-shadow:0 2px 0 #000,0 0 18px rgba(90,130,192,.45);
  }
  .sub{
    font-size:clamp(13px,1.5vw,18px);
    color:var(--sumi-usu);
    margin-top:4px;letter-spacing:.18em;
  }

  /* メイン舞台 */
  main{
    position:relative;z-index:2;
    flex:1;
    width:min(1100px,94vw);
    margin:0 auto;
    padding:22px 0 30px;
    display:flex;flex-direction:column;gap:20px;
  }

  /* 頼朝の語り場 */
  .stage{
    display:flex;align-items:flex-start;gap:22px;
  }
  .yoritomo{
    flex:0 0 auto;
    width:clamp(120px,15vw,180px);
    text-align:center;
  }
  .face{
    width:clamp(120px,15vw,180px);
    height:clamp(120px,15vw,180px);
    border-radius:50%;
    overflow:hidden;
    background:#16223a;
    border:5px solid var(--hata);
    box-shadow:0 0 0 4px var(--sumi),0 10px 30px rgba(0,0,0,.5);
    position:relative;
  }
  /* 口（顔）の絵。閉じた絵と開いた絵を、ぴったり同じ位置に重ねる */
  .face .mouth{
    position:absolute;
    inset:0;
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  .face .mouth.closed{ z-index:1; }           /* 口を閉じた絵（いつも見えている） */
  .face .mouth.open{ z-index:2; opacity:0; }  /* 口を開けた絵（ふだんは透明） */
  .face.talking-open .mouth.open{ opacity:1; } /* しゃべっている瞬間だけ見える */
  .face.no-img .mouth{ display:none; }
  .face-fallback{
    display:none;
    position:absolute;inset:0;z-index:3;
    width:100%;height:100%;
    align-items:center;justify-content:center;
    font-family:'Yuji Syuku',serif;
    font-size:clamp(20px,2.6vw,32px);line-height:1.15;
    color:var(--hata-akarui);letter-spacing:.05em;
    background:radial-gradient(circle at 50% 38%, #20335a, #0e1626);
  }
  .face.no-img .face-fallback{display:flex;}
  .name-tag{
    margin-top:10px;font-family:'Yuji Syuku',serif;
    font-size:clamp(16px,2vw,24px);color:var(--hata-akarui);letter-spacing:.1em;
  }

  /* 吹き出し（巻物風） */
  .scroll{
    flex:1;position:relative;
    background:linear-gradient(180deg,var(--washi),var(--washi-kage));
    color:var(--sumi);
    border-radius:14px;
    padding:26px 30px;
    min-height:170px;
    box-shadow:0 12px 34px rgba(0,0,0,.45),inset 0 0 0 3px rgba(44,83,144,.25);
    border:2px solid var(--ai);
  }
  .scroll::before{ /* 吹き出しのしっぽ */
    content:"";position:absolute;left:-18px;top:48px;
    border-style:solid;border-width:14px 18px 14px 0;
    border-color:transparent var(--ai) transparent transparent;
  }
  .scroll .answer{
    font-family:'Klee One',serif;
    font-size:clamp(20px,2.6vw,32px);
    line-height:1.75;font-weight:600;
    letter-spacing:.02em;
  }
  .scroll .answer .em{color:var(--aka-fuka);font-weight:700;}
  .cursor{display:inline-block;width:.5em;background:var(--aka);animation:blink .7s steps(1) infinite;}
  @keyframes blink{50%{opacity:0}}

  /* 質問エリア */
  .ask-zone{
    background:rgba(22,34,58,.7);
    border:2px solid var(--ai);
    border-radius:14px;
    padding:18px 20px;
  }
  .ask-zone .label{
    font-size:clamp(15px,1.7vw,20px);color:var(--hata-akarui);
    margin-bottom:12px;letter-spacing:.1em;font-weight:700;
  }
  .input-row{display:flex;gap:12px;flex-wrap:wrap;}
  #q{
    flex:1;min-width:220px;
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:clamp(18px,2.2vw,26px);font-weight:500;
    padding:14px 18px;border-radius:10px;border:none;
    background:var(--washi);color:var(--sumi);
  }
  #q:focus{outline:3px solid var(--ai-akarui);}
  .btn-ask{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(18px,2.2vw,26px);
    padding:14px 28px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--ai),#1d3a66);
    color:var(--hata);letter-spacing:.1em;
    box-shadow:0 4px 0 #112441,0 6px 14px rgba(0,0,0,.4);
    transition:transform .08s;
  }
  .btn-ask:active{transform:translateY(4px);box-shadow:0 1px 0 #112441;}

  footer{
    position:relative;z-index:2;text-align:center;
    font-size:13px;color:rgba(223,231,241,.4);
    padding:14px;letter-spacing:.1em;
  }
  @media(max-width:560px){
    .stage{flex-direction:column;align-items:center;}
    .scroll::before{display:none;}
    .yoritomo{order:-1;}
  }

  /* ===== モードタブ ===== */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:-4px 0 2px;}
  .tab{
    font-family:'Yuji Syuku',serif;font-size:clamp(15px,1.9vw,22px);
    padding:9px 20px;border-radius:999px;cursor:pointer;
    background:rgba(22,34,58,.7);color:var(--hata);
    border:2px solid var(--ai);letter-spacing:.08em;transition:all .15s;
  }
  .tab:hover{background:var(--ai);}
  .tab.active{background:linear-gradient(180deg,var(--aka),var(--aka-fuka));border-color:var(--aka);color:var(--hata-akarui);box-shadow:0 3px 0 #4a1714;}
  .panel[hidden]{display:none;}

  /* ===== クイズ ===== */
  .quiz-head{display:flex;justify-content:space-between;align-items:center;gap:10px 18px;flex-wrap:wrap;margin-bottom:14px;}
  .quiz-score{font-family:'Yuji Syuku',serif;font-size:clamp(14px,1.7vw,20px);color:var(--hata-akarui);letter-spacing:.05em;}
  .quiz-score b{color:#e7b94e;font-size:1.15em;}
  .choices{display:flex;flex-direction:column;gap:10px;}
  .choice{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;text-align:left;
    font-size:clamp(16px,2vw,23px);padding:14px 18px;border-radius:12px;cursor:pointer;
    background:var(--washi);color:var(--sumi);border:2px solid var(--ai);transition:all .12s;
  }
  .choice:hover:not(:disabled){background:var(--hata-akarui);transform:translateY(-2px);}
  .choice:disabled{cursor:default;}
  .choice.correct{background:#bfe0a8;border-color:var(--moegi);}
  .choice.wrong{background:#e7b0ac;border-color:var(--aka);}
  .quiz-next{margin-top:14px;text-align:right;}

  /* ===== ずかん ===== */
  .zukan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:10px;}
  .z-card{
    position:relative;cursor:pointer;border-radius:12px;padding:12px 8px;text-align:center;min-height:76px;
    background:rgba(22,34,58,.55);border:2px solid rgba(90,130,192,.4);color:var(--hata);
    display:flex;flex-direction:column;justify-content:center;gap:4px;transition:all .15s;
  }
  .z-card:hover{transform:translateY(-3px);border-color:var(--ai-akarui);}
  .z-name{font-family:'Yuji Syuku',serif;font-size:clamp(14px,1.7vw,18px);letter-spacing:.02em;}
  .z-cat{font-size:11px;color:var(--sumi-usu);}
  .z-card.got{background:linear-gradient(180deg,rgba(231,185,78,.22),rgba(22,34,58,.55));border-color:#e7b94e;}
  .z-seal{position:absolute;top:4px;right:5px;width:20px;height:20px;border-radius:50%;
    background:var(--aka);color:#fff;font-size:11px;line-height:20px;font-family:'Yuji Syuku',serif;opacity:0;transition:.2s;}
  .z-card.got .z-seal{opacity:1;}

  /* ===== 年表 ===== */
  .timeline{display:flex;flex-direction:column;}
  .tl-item{display:flex;gap:12px;cursor:pointer;align-items:stretch;}
  .tl-year{flex:0 0 auto;width:58px;text-align:right;font-family:'Yuji Syuku',serif;
    font-size:clamp(15px,1.8vw,20px);color:#e7b94e;padding-top:14px;}
  .tl-rail{flex:0 0 auto;position:relative;width:18px;}
  .tl-rail::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(90,130,192,.4);transform:translateX(-50%);}
  .tl-item:first-child .tl-rail::before{top:14px;}
  .tl-item:last-child .tl-rail::before{height:16px;bottom:auto;}
  .tl-dot{position:absolute;left:50%;top:14px;width:14px;height:14px;border-radius:50%;
    background:var(--ai-akarui);border:2px solid var(--hata);transform:translate(-50%,0);z-index:1;transition:.15s;}
  .tl-body{flex:1;margin:5px 0;background:rgba(22,34,58,.5);border:2px solid rgba(90,130,192,.35);
    border-radius:12px;padding:9px 14px;transition:.15s;}
  .tl-item:hover .tl-body{border-color:var(--ai-akarui);transform:translateX(3px);}
  .tl-item.active .tl-body{border-color:var(--aka);background:rgba(156,59,53,.18);}
  .tl-item.active .tl-dot{background:var(--aka);transform:translate(-50%,0) scale(1.3);}
  .tl-title{font-family:'Yuji Syuku',serif;font-size:clamp(15px,1.9vw,21px);letter-spacing:.02em;}

  /* 追加：クイズ問題文・ずかん見出し */
  .quiz-q{font-family:'Yuji Syuku',serif;font-size:clamp(18px,2.4vw,26px);color:var(--hata-akarui);line-height:1.55;margin:2px 0 16px;letter-spacing:.02em;}
  .zukan-head{margin-bottom:12px;}
  .panel{animation:fadein .25s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
  <header>
    <div class="mon">
      <span class="mon-maru">源</span>
      <div>
        <h1>頼朝くん</h1>
        <div class="sub">かまくら ものしり もんどう</div>
      </div>
      <span class="mon-maru">氏</span>
    </div>
  </header>

  <main>
    <div class="stage">
      <div class="yoritomo">
        <div class="face" id="face">
          <img class="mouth closed"
               src="https://raw.githubusercontent.com/byakusen/geogoe.yoritomo_kun/main/yoritomo3.png"
               alt="源頼朝（口を閉じた絵）"
               onerror="this.closest('.face').classList.add('no-img');">
          <img class="mouth open"
               src="https://raw.githubusercontent.com/byakusen/geogoe.yoritomo_kun/main/yoritomo4.png"
               alt="" aria-hidden="true">
          <span class="face-fallback">源<br>頼<br>朝</span>
        </div>
        <div class="name-tag">源頼朝</div>
      </div>
      <div class="scroll">
        <div class="answer" id="answer"></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="qa">もんどう</button>
      <button class="tab" data-tab="quiz">クイズ</button>
      <button class="tab" data-tab="zukan">ずかん</button>
      <button class="tab" data-tab="timeline">年表</button>
    </div>

    <!-- もんどう -->
    <section class="panel" id="panel-qa">
      <div class="ask-zone">
        <div class="label">▼ 頼朝くんに きいてみよう</div>
        <div class="input-row">
          <input id="q" type="text" placeholder="しつもんを 入力してね（れい：壇ノ浦の戦いってなに？）" autocomplete="off">
          <button class="btn-ask" id="askBtn">きく</button>
        </div>
      </div>
    </section>

    <!-- クイズ -->
    <section class="panel" id="panel-quiz" hidden>
      <div class="quiz-head">
        <div class="quiz-score">正解 <b id="quizCorrect">0</b> / <span id="quizTotal">0</span>　　れんしょう <b id="quizStreak">0</b></div>
        <button class="tab" id="quizRestart" type="button">はじめから</button>
      </div>
      <div class="quiz-q" id="quizQ"></div>
      <div class="choices" id="quizChoices"></div>
      <div class="quiz-next"><button class="btn-ask" id="quizNext" type="button" hidden>つぎの問題 ▶</button></div>
    </section>

    <!-- ずかん -->
    <section class="panel" id="panel-zukan" hidden>
      <div class="quiz-score zukan-head">あつめた札(ふだ)　<b id="zukanGot">0</b> / <span id="zukanTotal">0</span></div>
      <div class="zukan-grid" id="zukanGrid"></div>
    </section>

    <!-- 年表 -->
    <section class="panel" id="panel-timeline" hidden>
      <div class="timeline" id="timeline"></div>
    </section>
  </main>

  <footer>クラスで楽しむ 鎌倉もんどうアプリ／答えは小学生むけにやさしくまとめています</footer>

<script>
// ===== 頼朝の知識（小学4年生むけ・頼朝口調）100問 =====
// キーワードに当てはまる問いが来たら、その答えを返す。
const KB = [
  { keys:["生まれ","うまれ","いつ生","何年生","誕生","幼名","鬼武者","鬼武丸","おにむしゃ","子ども時代","こどものころ","小さいころ"],
    a:"わたしが生まれたのは1147年、尾張国の熱田(あつた、いまの愛知県名古屋市)じゃ。母方は熱田神宮の大宮司をつとめる家でな、そのゆかりの地で生まれたと伝わる。子どものころの名は「鬼武者(おにむしゃ)」、または「鬼武丸」といった。源氏の名門に生まれた、わたしの物語のはじまりよ。" },
  { keys:["父","ちち","おとう","義朝","よしとも","源義朝"],
    a:"わたしの父は源義朝(みなもとのよしとも)。源氏のかしらとして京や東国で活やくした武将じゃ。じゃが平治の乱という戦いに負け、東国へ逃げるとちゅう、尾張で家来に裏切られて命を落とした。父の無念を晴らすこと――それは、のちのわたしの大きな目あてとなったのじゃ。" },
  { keys:["母","はは","おかあ","由良","ゆら","由良御前"],
    a:"わたしの母は由良御前(ゆらごぜん)といい、熱田神宮の大宮司・藤原季範(すえのり)の娘じゃ。身分の高い家の出であったため、わたしは兄たちより上の「あとつぎ(嫡男)」としてあつかわれた。母の家がらが、のちのわたしの立場を強くしたのじゃ。" },
  { keys:["源氏とは","源氏って","清和源氏","河内源氏","清和天皇","源氏のしくみ"],
    a:"わたしの一族「源氏(げんじ)」は、もとをたどれば清和天皇(せいわてんのう)という天皇の子孫じゃ。中でもわたしの家は「河内源氏(かわちげんじ)」とよばれる、武芸にすぐれた名門でな。ライバルの平氏(へいし)とは、長く天下をあらそうことになる。源氏の白い旗が、わたしらのしるしよ。" },
  { keys:["兄弟","きょうだい","何人兄弟","兄は","弟は","義平","よしひら","朝長","ともなが","希義","まれよし"],
    a:"わたしには多くの兄弟がおった。兄の義平(よしひら)や朝長(ともなが)は平治の乱のころに命を落とし、同じ母の弟・希義(まれよし)も遠い土佐へ流された。のちに力を貸してくれた弟が、範頼(のりより)と義経(よしつね)じゃ。源氏一門のきずなと、悲しい別れがあったのじゃ。" },
  { keys:["乳母","うば","めのと","比企尼","ひきのあま","育ての"],
    a:"わたしを育ててくれた乳母(うば)の一人に、比企尼(ひきのあま)という女性がいた。わたしが伊豆に流されてつらい時も、ひそかに食べ物やお金を送りつづけてくれたのじゃ。のちに力をもった時、わたしはこの恩を忘れず、比企の一族を大切にした。人の情けは、いつか実を結ぶものよ。" },
  { keys:["先祖","せんぞ","ご先祖","頼義","よりよし","義家","よしいえ","八幡太郎","後三年"],
    a:"わたしの先祖には、東北での戦い(前九年の役・後三年の役)で名をあげた源頼義(よりよし)・源義家(よしいえ)がおる。とくに義家は「八幡太郎(はちまんたろう)」とよばれた、源氏のほまれ高い武将じゃ。わたしはこの先祖をお手本に、いくさや政治を進めた。名門のほこりは、大きな力になるのよ。" },
  { keys:["源平","げんぺい","平氏","へいし","平家","へいけ","赤旗","ライバル","てき"],
    a:"わたしら源氏と、平清盛(たいらのきよもり)ひきいる平氏(平家)は、天下をかけて争ったライバルじゃ。源氏は白い旗、平氏は赤い旗をかかげて戦った。一時は平氏が天下をにぎったが、わたしが各地の源氏や武士をまとめ、ついにこれをたおすことになる。この大きな戦いを「源平の戦い」というのよ。" },
  { keys:["熱田","あつた","熱田神宮","生まれた場所","うまれた場所","名古屋"],
    a:"わたしが生まれたのは、いまの愛知県名古屋市にある熱田神宮(あつたじんぐう)の近くと伝わる。母の家がこの神社の大宮司(だいぐうじ)という、神につかえる大切な役をつとめていたからじゃ。京で生まれたという説もあるが、源氏と熱田の深いつながりは、よく知られておる。" },
  { keys:["家紋","かもん","紋","もん","笹竜胆","ささりんどう","しるし","白旗","旗","はた"],
    a:"源氏のしるしといえば、まず「白い旗(白旗)」じゃ。戦いのとき、わたしらは白旗をかかげて平氏の赤旗と区別した。また源氏の家紋として「笹竜胆(ささりんどう)」という、ささの葉とりんどうの花をかたどった紋も知られておる。旗や紋は、味方を一つにまとめる大事なしるしなのじゃ。" },
  { keys:["保元","ほうげん","保元の乱"],
    a:"保元の乱(1156年)は、わたしが生まれてまもなく京で起きた戦いじゃ。父・義朝は平清盛らとともに後白河天皇(ごしらかわ)の側につき、勝った。じゃが父は、敵側についた自分の父(わたしの祖父)を、戦のあとに手にかけねばならなかった。身内どうしが敵味方に分かれる――武士の世の、つらいさだめよ。" },
  { keys:["平治","へいじ","平治の乱","負けた","まけた戦"],
    a:"平治の乱(1159年)は、父・義朝が平清盛とあらそって負けた戦いじゃ。これにより源氏は大きく力を失い、父は逃げるとちゅうで命を落とした。当時13歳のわたしも捕らえられ、ふつうなら死罪のところであった。源氏にとって、まさに「冬の時代」のはじまりじゃ。" },
  { keys:["池禅尼","いけのぜんに","助命","じょめい","命が助か","いのちが助","なぜ助","殺されなかった","死罪をまぬが"],
    a:"捕らえられたわたしは死罪になるはずじゃった。じゃが、平清盛のまま母にあたる池禅尼(いけのぜんに)という人が「この子の命を助けてやってほしい」と強くたのんでくれた。これにより、わたしは死罪をまぬがれ、伊豆へ流されることになったのじゃ。あの情けがなければ、のちの鎌倉幕府もなかった。命とは、ふしぎなものよ。" },
  { keys:["清盛","きよもり","平清盛","清盛との"],
    a:"平清盛は、父・義朝をやぶり、わたしを伊豆へ流した、いわば源氏の敵じゃ。じゃが清盛は、まだ子どもであったわたしの命まではうばわなかった。のちにわたしは力をたくわえ、清盛の死後、その平氏一門をたおすことになる。皮肉にも、わたしを生かしたことが、平氏のほろびる種にもなったのじゃ。" },
  { keys:["伊豆","いず","流された","流人","るにん","島流し","配流","はいる"],
    a:"平治の乱のあと、14歳のわたしは伊豆国(いまの静岡県の伊豆)へ流された。これを「流人(るにん)」という。京からはなれた土地で、見張られながらくらす身じゃ。じゃがこの伊豆こそ、北条氏ら東国の武士たちと出会い、やがて立ち上がる、わたしの再起の地となったのじゃ。" },
  { keys:["父の最期","父はどうな","義朝の最期","野間","のま","裏切られ","謀殺"],
    a:"父・義朝は平治の乱に負け、東国へ向かう道のとちゅう、尾張国の野間(のま)という所で、たよった家来に裏切られて命をうばわれた。逃げ場でゆだんしたところを討たれたのじゃ。父のむねんを晴らすこと――それはのちのわたしの戦いの、大きな理由の一つとなった。" },
  { keys:["流人生活","るにん生活","伊豆でのくらし","蛭ヶ小島","ひるがこじま","どんなくらし","流されてから"],
    a:"伊豆での流人ぐらしの細かな様子は、あまり記録に残っておらぬ。蛭ヶ小島(ひるがこじま)という所にいたと伝わる。わたしは箱根や伊豆山(いずさん)の神仏を深く信じ、お経をあげて、亡き父や源氏の人々をとむらいながら日々を送った。じっとがまんしながら、時を待っていたのじゃ。" },
  { keys:["時政","ときまさ","北条時政"],
    a:"北条時政(ほうじょうときまさ)は、わたしが流された伊豆の豪族で、のちにわたしの妻となる政子の父じゃ。はじめはわたしを見張る立場であったが、やがて娘の婿となり、挙兵のときには真っ先に力を貸してくれた。北条氏はのちに鎌倉幕府を支える、大事な一族となるのじゃ。" },
  { keys:["政子","まさこ","北条政子","妻","つま","奥さん"],
    a:"北条政子(ほうじょうまさこ)は、伊豆でわたしと結ばれた妻じゃ。気が強く、しっかり者でな、わたしを助け、ときにはわたしのおこないをきびしくいましめたりもした。わたしの死後は「尼将軍(あましょうぐん)」とよばれ、幕府を支えつづけた。まことに、たのもしい妻であったよ。" },
  { keys:["結婚","けっこん","出会い","であい","駆け落ち","かけおち","どうやって結ば","山木兼隆に嫁"],
    a:"わたしと政子の結婚には、こんな話が伝わる。父の時政はこの縁に反対し、政子をべつの相手に嫁がせようとした。じゃが政子は、その夜のうちに婚礼の場をぬけ出し、雨の中をわたしのもとへ走ったという。物語として語られた話で本当かはわからぬが、政子の強い気もちがよく表れた逸話じゃ。" },
  { keys:["義時","よしとき","北条義時"],
    a:"北条義時(ほうじょうよしとき)は、政子の弟で、わたしの家来となった武士じゃ。わたしの挙兵から最後まで力をつくしてくれた。わたしの死後は幕府の中心となり、のちに朝廷とのあらそい(承久の乱)で武士の世を守りぬくことになる。北条氏の力は、こうして大きくなっていったのじゃ。" },
  { keys:["大姫","おおひめ","長女","ちょうじょ"],
    a:"大姫(おおひめ)は、わたしと政子のあいだに生まれた長女じゃ。幼いころ、木曽義仲の子・義高(よしたか)とむすばれたが、義仲とわたしが争い、義高を討たねばならなくなった。大姫はそのことを深く悲しみ、やがて病にふせって、若くして世を去った。親として、むねのいたむ思い出じゃ。" },
  { keys:["以仁王","もちひとおう","令旨","りょうじ","平家追討の命","立ち上がるきっかけ"],
    a:"1180年、後白河法皇の皇子・以仁王(もちひとおう)が「平氏をたおせ」という命令(令旨)を、各地の源氏に送った。これがわたしのもとにも届いたのじゃ。以仁王ご自身はすぐにやぶれて命を落としたが、この令旨が、長くがまんしていた源氏が立ち上がる、大きなきっかけとなった。" },
  { keys:["行家","ゆきいえ","源行家","令旨を届け","おじ"],
    a:"源行家(みなもとのゆきいえ)は、わたしのおじにあたる人で、以仁王の令旨を各地の源氏に届けてまわった。わたしのもとへも、この令旨をとどけてくれたのじゃ。じゃが行家はのちにあちこちの源氏とむすんではなれ、最後はわたしと対立して討たれることになった。身内とのつき合いは、むずかしいものよ。" },
  { keys:["挙兵","きょへい","立ち上が","たちあが","なぜ戦","兵を挙","戦いを始め"],
    a:"令旨は受けたものの、わたしはすぐには動かず、しばらく様子を見ていた。じゃが平氏が「令旨を受けた源氏をみな討て」と動き出し、このままでは自分もあぶないと知ったとき、ついに挙兵(きょへい=兵を挙げて立ち上がること)を決めた。1180年、坂東(関東)の武士たちに力を貸してくれとよびかけたのじゃ。" },
  { keys:["文覚","もんがく","お坊さん","僧","院宣","いんぜん"],
    a:"文覚(もんがく)は、わたしと同じく伊豆に流されていた、変わったお坊さんじゃ。『平家物語』には、文覚が後白河法皇のもとへ行き、わたしに平氏をたおせという院宣(いんぜん=上皇の命令)をもらってきた、という話が伝わる。本当かどうかははっきりせぬが、わたしの挙兵をあとおしした人物として語られておる。" },
  { keys:["山木","やまき","兼隆","かねたか","最初の戦","はじめての戦","目代"],
    a:"1180年8月、わたしの挙兵の最初の的(まと)となったのは、伊豆の役人・山木兼隆(やまきかねたか)じゃ。北条時政らがその屋しきをおそい、これを討ち取った。これがわたしの兵を挙げた、いちばん最初の戦いよ。小さな一歩であったが、ここから天下への長い道が始まったのじゃ。" },
  { keys:["石橋山","いしばしやま","石橋山の戦い","大庭","三百騎"],
    a:"石橋山の戦い(1180年)は、わたしが挙兵してまもなく、平氏方の大軍にいどんで大敗した戦いじゃ。わたしの兵はわずか三百ほど、相手は三千あまり。山の中へ逃げこみ、あわやというところで命をひろった。はじめは負けの連続――それでもあきらめなんだことが、のちの勝ちにつながったのじゃ。" },
  { keys:["真鶴","まなづる","安房","あわ","船で逃","ふねで","海をわた"],
    a:"石橋山で負けたわたしは、山中をさまよったすえ、真鶴(まなづる)というみさきから船に乗り、海をわたって安房国(あわのくに、いまの千葉県南部)へ逃げのびた。負けてもにげのび、ふたたび力をたくわえる――これが、わたしのねばり強さよ。海をこえた先で、わたしの再起がはじまったのじゃ。" },
  { keys:["再起","さいき","安房で","立て直","たてなお","ふたたび力"],
    a:"安房へわたったわたしは、千葉氏や三浦氏といった東国の有力な武士たちをつぎつぎ味方につけ、軍をふくれ上がらせた。負けて逃げた身が、わずかな間に大きな勢力へ立ち直ったのじゃ。東国の武士たちが「この人なら」と、わたしを選んでくれたということよ。" },
  { keys:["上総広常","かずさひろつね","千葉常胤","ちばつねたね","味方","みかた","坂東武士が"],
    a:"安房から進むわたしに、房総(いまの千葉県)で大きな力をもつ上総広常(かずさひろつね)や千葉常胤(ちばつねたね)が、大軍をひきいて味方についた。とくに広常の参加は、その後の戦いをぐっと有利にした。多くの東国武士が集まったことで、わたしの軍はいっきに強大になったのじゃ。" },
  { keys:["鎌倉に入","鎌倉へ入","かまくらに入","鎌倉へ","本拠地","ほんきょち","拠点"],
    a:"1180年10月、わたしは大軍をひきいて鎌倉(かまくら)に入った。鎌倉は、かつて父や兄もくらした、源氏ゆかりの地じゃ。わたしはここを本拠地とさだめ、政治の中心とした。鎌倉はこののち、武士の世の都として大きく発展していくのじゃ。" },
  { keys:["なぜ鎌倉","どうして鎌倉","鎌倉を選","鎌倉の地形","守りやす","三方を山"],
    a:"なぜ鎌倉をえらんだか――まず、父祖ゆかりの源氏の地であったこと。そして鎌倉は、三方を山にかこまれ、一方が海という、守りにすぐれた地形であった。せめてくる敵をふせぎやすく、武士の都をつくるのにうってつけだったのじゃ。地の利を見ぬくことも、いくさの大事よ。" },
  { keys:["富士川","ふじがわ","水鳥","みずどり","平家が逃げ","維盛"],
    a:"富士川の戦い(1180年)では、平氏の大軍がわたしを討ちにやってきた。ところが夜、水鳥(みずどり)がいっせいに飛び立った羽音を、源氏の夜うちとかんちがいした平氏の軍は、戦わずにあわてて逃げ出してしまった、と伝わる。戦わずして勝ったこの一戦で、源氏の勢いは大いに高まったのじゃ。" },
  { keys:["義経との対面","黄瀬川","きせがわ","義経と再会","兄弟の再会","はじめて会"],
    a:"富士川のころ、奥州からはるばる、弟の義経(よしつね)がわたしのもとへかけつけた。幼いころに別れたきりの弟との、感げきの対面じゃ。義経はのちに、平氏との戦いでめざましい活やくを見せる。じゃがこの兄弟が、やがて悲しい仲たがいをするとは、このときは思いもよらなんだ。" },
  { keys:["侍所","さむらいどころ","和田義盛","わだよしもり","軍事","けいさつ"],
    a:"鎌倉にもどったわたしは「侍所(さむらいどころ)」という役所をつくり、和田義盛(わだよしもり)をその長(別当)にすえた。侍所は、御家人(家来の武士)をまとめ、軍事や警察(けいさつ)の仕事をうけもつ。武士の世を治めるための、いちばんはじめの大事なしくみよ。" },
  { keys:["御家人","ごけにん","家来の武士","けらい"],
    a:"わたしに忠義をちかい、つかえる武士たちを「御家人(ごけにん)」という。御家人はわたしのために戦い、わたしは御家人の領地(土地)を守ってやる。このたがいの約束で、強いきずなが生まれた。武士が武士をまとめる――それまでにない、新しい世のしくみじゃ。" },
  { keys:["御恩","ごおん","奉公","ほうこう","ごおんとほうこう","土地を守","ごほうび"],
    a:"わたしと御家人をむすぶ約束を「御恩(ごおん)と奉公(ほうこう)」という。わたしは御家人に領地をあたえ守ってやる(御恩)、御家人はわたしのために命をかけて戦う(奉公)。土地をなかだちにしたこのきずなこそ、鎌倉の武士の世を支えた、いちばんの土台なのじゃ。" },
  { keys:["本領安堵","ほんりょうあんど","新恩給付","しんおん","領地を保証","土地のほしょう"],
    a:"わたしは挙兵のはじめから、味方になった武士に「もとからの領地はそのまま守る(本領安堵)」「手がらをたてた者には新しい土地をあたえる(新恩給付)」と約束した。土地こそ武士のいちばんの願い。これを保証したからこそ、多くの坂東武士がわたしを選んでくれたのじゃ。" },
  { keys:["公文所","くもんじょ","大江広元","おおえのひろもと","政所","まんどころ","政治の役所"],
    a:"わたしは「公文所(くもんじょ)」という役所をつくり、京から来た有能な役人・大江広元(おおえのひろもと)を長にすえた。ここは政治やお金のことをあつかう、いわば幕府の頭脳じゃ。のちに「政所(まんどころ)」と名を変える。広元はわたしによい知恵をさずけてくれた、たよれる側近よ。" },
  { keys:["問注所","もんちゅうじょ","三善康信","みよしのやすのぶ","裁判","さいばん","うったえ"],
    a:"「問注所(もんちゅうじょ)」は、武士どうしの土地のあらそいなど、うったえ(裁判)をさばく役所じゃ。長には三善康信(みよしのやすのぶ)をすえた。康信は、わたしが流人のころから京の知らせを送ってくれた人でな。きちんとした裁きで世を治める――これも武士の政治に欠かせぬものよ。" },
  { keys:["義仲","よしなか","木曽義仲","きそ","いとこ"],
    a:"木曽義仲(きそよしなか)は、わたしのいとこにあたる源氏の武将じゃ。同じころ信濃で挙兵し、京から平氏を追い出すという大きな手がらをたてた。じゃが京での義仲の軍は乱ぼうで人々にきらわれ、やがてわたしと対立。わたしは弟たちを送ってこれをやぶった。源氏どうしのあらそいは、まことに悲しいものよ。" },
  { keys:["義高","よしたか","清水冠者","人質","ひとじち","和議","わぎ","義仲との約束"],
    a:"義仲とあらそいかけたとき、いったんは和解した。そのしるしに、義仲の子・義高(よしたか)を、わたしの娘・大姫の婿として鎌倉にむかえた。じつは人質のようなものじゃ。じゃがのちに義仲をたおすと、義高も討たねばならなくなった。大姫はこれを深く悲しんだ。政(まつりごと)のための、つらい決断であった。" },
  { keys:["義仲の最期","義仲はどうな","宇治川","うじがわ","粟津","あわづ"],
    a:"京で人々の心がはなれた義仲を討つため、わたしは弟の範頼(のりより)と義経(よしつね)を送った。義経らは宇治川(うじがわ)の戦いで義仲の軍をやぶり、義仲は粟津(あわづ)という所で討たれた(1184年)。勢いのあった義仲も、わずかな間に世を去った。いくさの世のはやさを、よく表しておる。" },
  { keys:["範頼と義経を","代官","だいかん","弟を送","弟たちを送","本拠地でかまえ"],
    a:"わたし自身は鎌倉にどっしりとかまえ、戦いには弟の範頼(のりより)と義経(よしつね)を「代官(だいかん)」として送り出した。かしらが本拠地で全体を見わたし、弟たちが前線で戦う――この役わり分けが、わたしの強さの一つよ。自分が動かずとも天下を動かす、それが棟梁(とうりょう)というものじゃ。" },
  { keys:["寿永二年","じゅえいにねん","十月宣旨","せんじ","東国支配","公認","みとめられ"],
    a:"1183年10月、朝廷はわたしに東海道・東山道(東国の広い地いき)を治める権利をみとめる命令を出した(寿永二年十月宣旨)。それまで「反乱軍」とも見られていたわたしの政権が、これで正式にみとめられたのじゃ。実力だけでなく、朝廷のおすみつきも得て、わたしの立場はぐっと固まった。" },
  { keys:["一ノ谷","いちのたに","ひよどり越","鵯越","一の谷"],
    a:"一ノ谷の戦い(1184年)は、弟・義経らが平氏の陣を打ちやぶった戦いじゃ。義経が、けわしい山のがけを馬でかけ下りて平氏のうしろをついた「鵯越(ひよどりごえ)」の話が有名でな。この勝利で平氏は大きく力をうしない、西へと追いつめられていった。" },
  { keys:["屋島","やしま","那須与一","なすのよいち","扇の的","おうぎのまと","讃岐"],
    a:"屋島の戦い(1185年)は、讃岐(さぬき、いまの香川県)で平氏を海上に追いやった戦いじゃ。源氏の那須与一(なすのよいち)が、波にゆれる船の上の扇(おうぎ)を一矢で射ぬいた話が、よく知られておる。義経のすばやい作戦で、平氏はいよいよ追いつめられたのじゃ。" },
  { keys:["壇ノ浦","だんのうら","平家滅亡","へいけほろ","平氏ほろ","海の戦","だんのうらの戦"],
    a:"壇ノ浦の戦い(1185年)は、いまの山口県の海でおこなわれた、平氏との最後の決戦じゃ。義経ひきいる源氏が勝ち、ついに平氏一門はほろびた。長くつづいた源平の戦いの、終わりの場面よ。父の無念を晴らし、源氏が天下に立つ――わたしの大きな願いが、ここでかなったのじゃ。" },
  { keys:["安徳天皇","あんとく","三種の神器","じんぎ","神器","海に沈"],
    a:"壇ノ浦の戦いでは、平氏とともにあった幼い安徳天皇(あんとくてんのう)が、海に身を投げて亡くなられた。天皇のしるしである「三種の神器(じんぎ)」のうち、剣(つるぎ)も海にしずんで見つからなかったと伝わる。勝ちのかげにも、こうした深い悲しみがあったのじゃ。" },
  { keys:["宗盛","むねもり","平宗盛","平家のかしら","とらえられ"],
    a:"平宗盛(たいらのむねもり)は、清盛のあとをついだ平氏のかしらじゃ。壇ノ浦の戦いで源氏に捕らえられ、鎌倉のわたしのもとへ送られてきた。わたしは宗盛と対面したのち、京へ送りかえす道中で命を絶たせた。平氏のかしらをくだしたことで、源氏の勝ちは、だれの目にもはっきりしたのじゃ。" },
  { keys:["範頼","のりより","源範頼","弟の範頼"],
    a:"源範頼(みなもとののりより)は、わたしの弟で、義経とならんで平氏追討の大将をつとめた。義経のようなはなやかさはないが、まじめにわたしを支えてくれた。じゃがのちに、思いがけぬことから謀反(むほん)を疑われ、伊豆へ流されてしまう。身内であっても、うたがいは容しゃなく――それが棟梁のさだめであった。" },
  { keys:["義経","よしつね","源義経","牛若丸","うしわかまる"],
    a:"源義経(みなもとのよしつね)は、わたしの末の弟じゃ。幼名を牛若丸(うしわかまる)といい、平氏との戦いでめざましい手がらをたてた、まさに英ゆうよ。一ノ谷・屋島・壇ノ浦と、つぎつぎ勝利をかざった。じゃが、その後わたしと深く対立し、悲しい運命をたどる。世にいう「判官びいき」――人々は義経に同情を寄せたのじゃ。" },
  { keys:["義経の活躍","義経はなにを","義経のてがら","義経すごい","平氏をたおした弟"],
    a:"義経は、平氏との戦いで天才的ないくさぶりを見せた。けわしいがけを馬でかけ下りた一ノ谷、すばやく敵をついた屋島、そして平氏をほろぼした壇ノ浦――いずれも義経の働きが大きい。戦さの才では、わたしの身内でいちばんであったろう。じゃが、戦いの強さと政治のうまさは、また別のものなのじゃ。" },
  { keys:["義経と対立","仲が悪","なかが悪","なぜけんか","けんか","仲たがい","なぜ義経を","勝手に任官","対立の原因"],
    a:"なぜ弟の義経と対立したか――義経が、わたしに知らせず朝廷から官職を受けたり、勝手にふるまったりしたことが大きい。武士をまとめるには「すべてわたしを通すこと」という決まりが大事じゃった。それをやぶられては、せっかくの仕組みがくずれてしまう。身内であっても、けじめはつけねばならなかったのじゃ。" },
  { keys:["腰越","こしごえ","腰越状","鎌倉に入れ","会ってもらえ","兄に会いた"],
    a:"壇ノ浦のあと、義経は捕らえた平宗盛をつれて鎌倉へやってきた。じゃがわたしは、義経を鎌倉に入れることをゆるさなかった。義経は腰越(こしごえ)という所にとどまり、「どうかうたがいを晴らしてください」と手紙(腰越状)を送ってきた。だが、わたしの決心は変わらなんだ。兄弟の心がはなれた、悲しい場面じゃ。" },
  { keys:["梶原","かじわら","景時","かげとき","梶原景時","讒言","ちくり"],
    a:"梶原景時(かじわらかげとき)は、わたしによく仕えた家来じゃ。義経の戦いを見はる役につき、義経の勝手なふるまいをわたしに報告した。これが義経との対立を深めたともいわれ、後の世では「義経をおとしいれた悪者」のように語られることもある。じゃが景時は、わたしに忠義をつくしたまじめな武士でもあったのよ。" },
  { keys:["義経追討","義経をおう","頼朝追討","義経が宣旨","逆に追われ"],
    a:"対立がふかまると、義経は朝廷から「頼朝を討て」という命令(宣旨)まで引き出した。じゃが義経のもとには兵が集まらず、形勢は不利。今度は逆に、わたしが義経を追う立場となった。源氏どうしが命をかけて争う――父の代から、わたしらはこうしたあらそいをくり返してきたのじゃ。" },
  { keys:["義経が逃","義経の逃亡","西国へ逃","船が難破","嵐","あらし"],
    a:"兵の集まらぬ義経は、ついに戦わずして京を落ち、船で西国(西の方)へ逃げようとした。じゃがとちゅうで大あらしにあい、船はばらばらにこわれてしまう。一行は散りぢりになり、義経はゆくえをくらました。栄光のはてに落ちのびていく弟の姿は、人々の心を強く打ったのじゃ。" },
  { keys:["静御前","しずか","しずかごぜん","白拍子","しらびょうし","舞","まい"],
    a:"静御前(しずかごぜん)は、義経が愛した白拍子(しらびょうし=舞をまう女性)じゃ。義経が逃げるとき別れ別れになり、吉野山で捕らえられて鎌倉へ送られた。わたしの前で舞をまわされたとき、静は義経をしたう歌をうたい、政子もその心に同情したと伝わる。敵方の女性にも、心を寄せる――そういう物語が残っておる。" },
  { keys:["守護","しゅご","地頭","じとう","文治の勅許","ちょっきょ","全国に置"],
    a:"1185年、わたしは義経をとらえることを口実に、朝廷に願い出て、全国に「守護(しゅご)」と「地頭(じとう)」を置く権利を手に入れた。守護は国ごとの軍事・警察、地頭は荘園や土地の管理をする役じゃ。これにより、わたしの力は全国にゆきわたった。鎌倉幕府の大事なしくみの一つよ。" },
  { keys:["義経が奥州","奥州へ逃","秀衡をたよ","平泉へ逃"],
    a:"京にも居場所をうしなった義経は、はるばる奥州(おうしゅう、いまの東北地方)へ逃れ、藤原秀衡(ふじわらのひでひら)という強い豪族にかくまわれた。秀衡は義経を大切にもてなした。じゃが、わたしの力はやがて奥州にもおよぶ。義経の運命は、しだいに追いつめられていくのじゃ。" },
  { keys:["奥州藤原","おうしゅうふじわら","藤原氏","平泉の藤原","東北の豪族"],
    a:"奥州藤原氏(おうしゅうふじわらし)は、いまの岩手県・平泉(ひらいずみ)を中心に、東北で大きな富と力をほこった一族じゃ。金がよく取れ、中尊寺(ちゅうそんじ)など豪華な寺を建てた。じゃがわたしにとっては、最後にのこった大きな敵。これをたおして、わたしは全国の武士をしたがえることになる。" },
  { keys:["秀衡","ひでひら","藤原秀衡"],
    a:"藤原秀衡(ふじわらのひでひら)は、奥州藤原氏のかしらで、逃げてきた義経をかくまった人じゃ。義経をわが子のように守り、わたしともうまくつき合おうとした、かしこい武将よ。じゃが秀衡が病で世を去ると、奥州の力はかたむきはじめる。大黒柱を失った家は、もろいものなのじゃ。" },
  { keys:["泰衡","やすひら","藤原泰衡","秀衡の子"],
    a:"藤原泰衡(ふじわらのやすひら)は、秀衡の子じゃ。父のあとをついだが、わたしの強い圧力におそれをなし、ついにかくまっていた義経をおそった(1189年)。じゃがそれでもわたしはゆるさず、奥州へせめのぼった。泰衡もまた、最後は家来に裏切られて命を落とした。裏切りは裏切りをよぶ、おそろしいものよ。" },
  { keys:["義経の最期","義経はどうなった","衣川","ころもがわ","義経の死","判官の最期"],
    a:"奥州へ逃れた義経も、ついに追いつめられた。1189年、かくまっていた藤原泰衡におそわれ、衣川(ころもがわ)の館で命をおとしたと伝わる。あれほど戦さに強かった弟が、兄であるわたしに追われ、はなれた地でさいごをむかえた――歴史でもっとも悲しい兄弟の物語の一つとして、長く語りつがれておる。" },
  { keys:["奥州合戦","おうしゅうがっせん","奥州を攻","平泉を攻","泰衡を討"],
    a:"1189年、わたしは義経をかくまった責めを口実に、全国の武士をひきいて奥州へせめのぼった(奥州合戦)。藤原泰衡の軍をやぶり、ついに奥州藤原氏をほろぼした。これにより、わたしにしたがわぬ大きな勢力はなくなり、長くつづいた源平の内乱もここで終わったのじゃ。" },
  { keys:["前九年","ぜんくねん","頼義のまね","先祖をまね","故事","こじ","お手本にした戦"],
    a:"奥州合戦には、もう一つねらいがあった。先祖の源頼義(よりよし)が、むかし同じ奥州で安倍氏をたおした戦い(前九年の役)を、わざとなぞらえたのじゃ。同じ場所、同じやり方をくり返すことで「源氏の正統なかしらはこのわたしだ」と、全国の武士に見せつけた。先祖の名は、心を一つにまとめる力をもつのよ。" },
  { keys:["平泉","ひらいずみ","中尊寺","ちゅうそんじ","金色堂","こんじきどう"],
    a:"平泉(ひらいずみ)は、奥州藤原氏が栄えた、いまの岩手県の地じゃ。金色にかがやく中尊寺金色堂(こんじきどう)など、それはみごとな寺々があった。奥州をたいらげたわたしは、その美しさに心を打たれ、寺領を守ってやった。のちに鎌倉にも、平泉をまねた寺(永福寺)を建てたのじゃ。" },
  { keys:["上洛","じょうらく","京へ","京に行","京にのぼ","はじめて京"],
    a:"1189年に奥州をたいらげ、内乱を終わらせたわたしは、翌1190年、ついに京へのぼった(上洛)。流人として伊豆に流されてから30年。父の無念を晴らし、武士のかしらとして京に立つ――感がい深いものであった。後白河法皇とも何度も会い、これからの世の話し合いをしたのじゃ。" },
  { keys:["後白河","ごしらかわ","法皇","ほうおう","大天狗","だいてんぐ"],
    a:"後白河法皇(ごしらかわほうおう)は、長く朝廷の中心にいた、なかなかしたたかな方じゃ。源氏と平氏、わたしと義仲、わたしと義経――あちらを立て、こちらを立て、たくみにあやつろうとなさった。わたしと法皇は、たがいの力をはかりあう間がらでな。上洛の折には、八回も二人だけで語り合ったのじゃ。" },
  { keys:["右近衛大将","うこんえのたいしょう","大将に任","すぐ辞","辞めた","官職を辞","権大納言"],
    a:"上洛したとき、わたしは朝廷から「権大納言」「右近衛大将(うこんえのたいしょう)」という高い位をさずかった。じゃが、すぐにこれを辞退した。京の役目にしばられては、本拠地の鎌倉にもどれなくなるからじゃ。位の高さよりも、武士の世を治める実(じつ)を取る――それがわたしの考えであった。" },
  { keys:["征夷大将軍","せいいたいしょうぐん","将軍","しょうぐん","将軍になっ"],
    a:"1192年、わたしは朝廷から「征夷大将軍(せいいたいしょうぐん)」に任じられた。これは武士のかしらをあらわす、もっとも名高い位じゃ。これによりわたしは、名実ともに武士の世の頭(かしら)となった。征夷大将軍は、このあと江戸時代の終わりまで、武士の世のしるしとして700年近くもつづくことになる。" },
  { keys:["鎌倉幕府","鎌倉幕府は何年","鎌倉幕府の成立","鎌倉幕府ができ","鎌倉幕府はいつ","成立","せいりつ","成立年","何年","なんねん","できたのは","できた年","いつでき","いつ成立","幕府はいつ","幕府ができ","幕府は何年","幕府の成立","始まり","はじまり","1185","1192","いい国","いい箱","いいくに","いいはこ"],
    a:"「鎌倉幕府は何年にできたか」――これはよい問いじゃ。むかしは「いい国(1192)つくろう鎌倉幕府」と、わたしが征夷大将軍になった1192年をはじまりとして覚えた。じゃが今では、わたしが守護・地頭を置く権利を得た1185年(いい箱つくろう)を始まりと考える説も強い。じつは幕府は一日でできたのではなく、1180年に鎌倉へ入ってから少しずつ形づくられていったのじゃ。歴史は、調べ直すたびに見方が変わるものよ。" },
  { keys:["鎌倉幕府","かまくらばくふ","幕府","ばくふ","武家政権","ぶけせいけん","どんな政府"],
    a:"わたしが鎌倉につくった武士の政府を、のちに「鎌倉幕府(かまくらばくふ)」とよぶ。1185年ごろから1192年にかけて形を整えていった、武士による新しい政権じゃ。京の朝廷から遠くはなれ、武士が武士のために政治をおこなう――それまでにない仕組みよ。侍所・公文所(政所)・問注所といった役所がそれを支えた。武士の世のはじまりじゃ。" },
  { keys:["鶴岡八幡宮","つるがおか","八幡宮","はちまんぐう","神社をまつ","八幡さま"],
    a:"鶴岡八幡宮(つるがおかはちまんぐう)は、源氏が大切にした八幡(はちまん)の神をまつる、鎌倉の中心の神社じゃ。わたしはこれを今の地にうつし、りっぱにととのえた。鎌倉の町は、この八幡宮を中心に道がのびるよう計画してつくられた。神への祈りと町づくりが、一つになっておるのじゃ。" },
  { keys:["富士の巻狩","富士のまきがり","頼家が鹿","鹿を射","巻狩り","まきがり","巻き狩り"],
    a:"1193年、わたしは多くの御家人を集め、富士のふもとで大がかりな「巻狩り(まきがり)」をおこなった。これはたくさんの勢ぜいで山の獣を追う武芸のくんれんであり、武士の力を見せる行事でもあった。このとき12歳のあとつぎ・頼家(よりいえ)が初めて鹿を射とめ、わたしは大いに喜んだのじゃ。" },
  { keys:["曾我","そが","曾我兄弟","仇討ち","あだうち","かたきうち","工藤祐経"],
    a:"富士の巻狩りのさなか、「曾我兄弟の仇討ち(そがきょうだいのあだうち)」という事件が起きた。曾我十郎・五郎の兄弟が、父のかたきである工藤祐経(くどうすけつね)を、長年の思いをはらしてうち取ったのじゃ。日本三大あだ討ちの一つとして、後の世まで語りつがれる出来事よ。" },
  { keys:["範頼を疑","範頼を流","範頼の謀反","範頼はどうな","弟を流"],
    a:"あの誠実な弟・範頼(のりより)さえ、わたしは最後にはうたがってしまった。曾我の事件のさい、範頼が政子に「わたしがおります」と言ったことが、まるで自分が将軍になろうとしているかのように聞こえたのじゃ。わたしは範頼を伊豆へ流した。力をもつ者として、わたしは身内さえ信じきれなんだ――かなしいさだめよ。" },
  { keys:["頼家","よりいえ","源頼家","二代将軍","あとつぎ","長男","ちょうなん"],
    a:"源頼家(みなもとのよりいえ)は、わたしと政子のあいだに生まれたあとつぎじゃ。わたしの死後、二代目の将軍となった。じゃが若くして力をふるおうとして御家人たちと対立し、やがて北条氏によって退けられ、悲しい最期をむかえた。わたしのきずいた幕府は、子の代から早くもゆれ動いたのじゃ。" },
  { keys:["実朝","さねとも","源実朝","三代将軍","和歌の将軍"],
    a:"源実朝(みなもとのさねとも)は、わたしの次男で、兄・頼家のあと三代目の将軍となった。和歌(短い詩)を愛した、心やさしい人物じゃ。じゃが実朝もまた、若くして鶴岡八幡宮でおそわれ命を落とした。これにより、わたしの血すじの将軍は三代でとだえ、政治は北条氏が動かすことになる。" },
  { keys:["大姫の入内","じゅだい","天皇のきさき","娘をきさき","大姫の病死","大姫が死"],
    a:"わたしは晩年、娘の大姫(おおひめ)を天皇のきさきにしようと、朝廷にさかんに働きかけた。源氏の血を天皇家につなげば、わたしの力はさらに強まると考えたのじゃ。じゃが大姫は、幼い日の悲しみを引きずったまま病にふせり、若くして世を去ってしまった。親の思いどおりには、いかぬものよ。" },
  { keys:["性格","せいかく","どんな人","人がら","ひとがら","厳しい","きびしい","用心深","ようじん"],
    a:"わたしはどんな人物か――ひとことでいえば、用心ぶかく、けじめにきびしい男じゃ。身内であっても、力をもちすぎる者はうたがい、退けた。冷たいと思われたかもしれぬ。じゃがそれは、せっかくまとめた武士の世を、二度とくずさぬためであった。やさしさだけでは、世は治められぬのじゃ。" },
  { keys:["顔","かお","肖像","しょうぞう","どんな顔","姿","絵すがた"],
    a:"じつは、わたしの本当の顔はよくわかっておらぬ。長く「わたしの肖像画」とされてきた京・神護寺の絵も、近ごろは「べつの人ではないか」と議論されておる。教科書でよく見るあの絵も、本当にわたしかどうかははっきりせぬのじゃ。記録の少なさが、かえって人々の想ぞうをかきたてるのよ。" },
  { keys:["身長","しんちょう","背","せがたかい","大きさ","容ぼう","ようぼう","せは"],
    a:"古い記録によると、わたしは「顔が大きく、背は低め、姿は上品で、話し方はりっぱ」であったという。よろいから推しはかると、身長は165センチほどで、当時としてはむしろ高いほうじゃ。見た目より、その威げんと、ものごとをはっきり決める力が、人々の印象に残ったようじゃ。" },
  { keys:["御家人をまとめ","家来を統制","とうせい","力をおさ","有力な武士を退け","粛清","しゅくせい"],
    a:"わたしは、力をもちすぎた御家人を、ときに退けることもためらわなかった。味方であった上総広常(かずさひろつね)や、弟の範頼さえ、危ういと見れば容しゃしなかった。冷酷と言われようとも、だれか一人が大きくなりすぎれば、せっかくの秩序がくずれる。かしらとは、そういう重い役目なのじゃ。" },
  { keys:["朝廷との","ちょうていと","天皇との","公家","くげ","京とのかんけい"],
    a:"わたしは朝廷をたおそうとはしなかった。むしろ朝廷を立てつつ、その公(おおやけ)のみとめを得て、自分の力を正しいものとしたのじゃ。守護・地頭も征夷大将軍も、すべて朝廷から正式にさずかった。武力だけでなく、おすみつきも味方にする――これがわたしの政治のやり方であった。" },
  { keys:["治承","じしょう","寿永","じゅえい","治承寿永","内乱","ないらん","源平の内乱"],

  { keys:["最期","さいご","死","しんだ","亡くなっ","落馬","らくば","どうやって死","頼朝の死"],

// 入力にいちばん合う答えをさがす
function findAnswer(text){
  const t = (text||"").replace(/\s/g,"");
  if(!t) return null;
  let best=null, bestScore=0;
  for(const item of KB){
    let score=0;
    for(const k of item.keys){ if(t.includes(k)) score += k.length; }
    if(score>bestScore){bestScore=score; best=item;}
  }
  return bestScore>0 ? best.a : null;
}

const answerEl = document.getElementById('answer');
const faceEl = document.getElementById('face');
let typing=null;

// ===== 口パク（口を閉じた絵と開けた絵を高速で切りかえる） =====
let mouthTimer=null;
function startMouth(){
  stopMouth();
  mouthTimer=setInterval(()=>{ faceEl.classList.toggle('talking-open'); },130);
}
function stopMouth(){
  if(mouthTimer){ clearInterval(mouthTimer); mouthTimer=null; }
  faceEl.classList.remove('talking-open');  // 最後は口を閉じた絵にもどす
}

function speak(text){
  startMouth();                 // しゃべりはじめ：口を動かす
  if(typing) clearInterval(typing);
  answerEl.innerHTML="";
  let i=0;
  const cursor=document.createElement('span');
  cursor.className='cursor'; cursor.textContent='　';
  answerEl.appendChild(cursor);
  typing=setInterval(()=>{
    if(i>=text.length){clearInterval(typing); cursor.remove(); stopMouth(); return;}  // しゃべりおわり：口を止める
    const ch=document.createTextNode(text[i]);
    answerEl.insertBefore(ch,cursor);
    i++;
  },32);
}

function handleAsk(text){
  const a = findAnswer(text);
  if(a){ speak(a); }
  else{ speak(NOT_FOUND[Math.floor(Math.random()*NOT_FOUND.length)]); }
}

let qOrder=[],qIdx=0,qCorrect=0,qTotal=0,qStreak=0,quizFinished=false,quizStarted=false;
const quizQEl=document.getElementById('quizQ');
const quizChoicesEl=document.getElementById('quizChoices');
const quizNextBtn=document.getElementById('quizNext');

function updateQuizScore(){
  document.getElementById('quizCorrect').textContent=qCorrect;
  document.getElementById('quizTotal').textContent=qTotal;
  document.getElementById('quizStreak').textContent=qStreak;
}
function startQuiz(){
  quizStarted=true;quizFinished=false;
  qOrder=shuffle(QUIZ.map((_,i)=>i));qIdx=0;qCorrect=0;qTotal=0;qStreak=0;
  updateQuizScore();
  speak("ではクイズじゃ！　全"+QUIZ.length+"問、何問わかるかな？　正しいと思うものをえらぶがよい。");
  loadQuestion();
}
function loadQuestion(){
  quizNextBtn.hidden=true;
  const item=QUIZ[qOrder[qIdx]];
  quizQEl.textContent="第"+(qIdx+1)+"問　"+item.q;
  quizChoicesEl.innerHTML="";
  shuffle(item.choices.map((c,i)=>i)).forEach(ci=>{
    const b=document.createElement('button');
    b.className='choice';b.type='button';b.textContent=item.choices[ci];
    b.onclick=()=>answerQuiz(b,ci===item.ans,item);
    quizChoicesEl.appendChild(b);
  });
}
function answerQuiz(btn,correct,item){
  [...quizChoicesEl.children].forEach(b=>{
    b.disabled=true;
    if(b.textContent===item.choices[item.ans]) b.classList.add('correct');
  });
  qTotal++;
  if(correct){qCorrect++;qStreak++;speak("せいかい！　"+item.exp);}
  else{qStreak=0;btn.classList.add('wrong');speak("ざんねん。　"+item.exp);}
  updateQuizScore();
  quizNextBtn.hidden=false;
  quizNextBtn.textContent=(qIdx+1<QUIZ.length)?"つぎの問題 ▶":"けっかを見る ▶";
  window.scrollTo({top:0,behavior:'smooth'});
}
function showQuizResult(){
  quizFinished=true;
  quizQEl.textContent="クイズ おわり！　全"+QUIZ.length+"問中　"+qCorrect+"問 せいかい！";
  quizChoicesEl.innerHTML="";
  const r=qCorrect/QUIZ.length;
  let msg;
  if(r===1) msg="みごと全問せいかいじゃ！　お主、源平・鎌倉の達人よな。あっぱれ！";
  else if(r>=0.7) msg="よくできたぞ！　なかなかの物知りじゃ。まちがえた問いは、もう一度たしかめておくとよい。";
  else if(r>=0.4) msg="うむ、その調子じゃ。『もんどう』や『ずかん』『年表』で調べて、また挑戦してみよ。";
  else msg="気を落とすでない。何度でも挑めるぞ。まずは『年表』で、わたしの一生をながめてみるとよい。";
  speak(msg);
  quizNextBtn.hidden=false;quizNextBtn.textContent="もう一度 ▶";
  window.scrollTo({top:0,behavior:'smooth'});
}
quizNextBtn.onclick=()=>{
  if(quizFinished){startQuiz();return;}
  if(qIdx+1<QUIZ.length){qIdx++;loadQuestion();}
  else{showQuizResult();}
};
document.getElementById('quizRestart').onclick=startQuiz;

  {name:"源義仲",cat:"いとこ",desc:"いとこの木曽義仲じゃ。勇ましく平氏を京から追ったが、わたしと対立し、宇治川・粟津でやぶれた。"},
  {name:"藤原秀衡",cat:"奥州",desc:"奥州藤原氏のかしら・藤原秀衡じゃ。義経を育て、のちにかくまった。生きているうちは手を出せぬ相手であった。"},
  {name:"後白河法皇",cat:"朝廷",desc:"朝廷の中心にいた後白河法皇じゃ。義仲や義経を動かし、わたしとも長くかけひきを続けた、したたかな人物よ。"},
  {name:"静御前",cat:"その他",desc:"義経が愛した白拍子(しらびょうし)・静御前じゃ。鎌倉でわたしの前でも、義経をしたう歌をうたいあげた。"},
  {name:"平治の乱",cat:"できごと",desc:"1159年の平治の乱じゃ。父・義朝が平清盛に負け、源氏が大きく力を失った。わたしの運命を変えた戦いよ。"},
  {name:"壇ノ浦の戦い",cat:"できごと",desc:"1185年の壇ノ浦の戦いじゃ。いまの山口県の海で、義経の軍が平氏をやぶり、ついに平家はほろびた。"},
  {name:"奥州合戦",cat:"できごと",desc:"1189年の奥州合戦じゃ。義経をかくまった奥州藤原氏を、大軍でほろぼした。これで天下を争う相手はいなくなった。"},
  {name:"鎌倉幕府",cat:"できごと",desc:"わたしがひらいた鎌倉幕府じゃ。武士による日本初の政府で、形を変えながら約700年続く武士の世のはじまりよ。"},
  {name:"守護と地頭",cat:"しくみ",desc:"全国に置いた守護と地頭じゃ。守護は国ごとの軍事・警察、地頭は土地ごとの年貢集め。幕府の支配のかなめよ。"}
];
const zukanGot=new Set();
let builtZukan=false;
function buildZukan(){
  document.getElementById('zukanTotal').textContent=ZUKAN.length;
  const grid=document.getElementById('zukanGrid');grid.innerHTML="";
  ZUKAN.forEach((it,i)=>{
    const c=document.createElement('button');
    c.className='z-card';c.type='button';
    const seal=document.createElement('span');seal.className='z-seal';seal.textContent='済';
    const nm=document.createElement('span');nm.className='z-name';nm.textContent=it.name;
    const ct=document.createElement('span');ct.className='z-cat';ct.textContent=it.cat;
    c.append(seal,nm,ct);
    c.onclick=()=>{
      if(!zukanGot.has(i)){zukanGot.add(i);c.classList.add('got');document.getElementById('zukanGot').textContent=zukanGot.size;}
      speak(it.desc);
      window.scrollTo({top:0,behavior:'smooth'});
    };
    grid.appendChild(c);
  });
}

// ----- 年表 -----

  {year:"1159",title:"平治の乱",desc:"1159年の平治の乱で、父・義朝が平清盛に負けた。13歳のわたしも捕らえられ、源氏は冬の時代に入った。"},
  {year:"1160",title:"伊豆へ流される",desc:"1160年、14歳のわたしは死罪をまぬがれ、伊豆へ流された。ここから約20年の長い流人ぐらしがはじまる。"},
  {year:"1180",title:"挙兵・鎌倉入り",desc:"1180年、以仁王の令旨を受けて兵をあげた。石橋山では負けたが、海をわたって味方を集め、鎌倉を本拠地とした。"},
  {year:"1180",title:"富士川の戦い",desc:"同じ1180年、富士川で平氏の軍と対した。水鳥の羽音を夜うちとまちがえた平氏は、戦わずに逃げたと伝わる。"},
  {year:"1184",title:"義仲をたおす",desc:"1184年、京で乱れたいとこ・木曽義仲を、弟の範頼・義経に命じて宇治川・粟津でやぶった。"},
  {year:"1185",title:"壇ノ浦・平氏滅亡",desc:"1185年、壇ノ浦の戦いで義経が平氏をほろぼした。父のかたきを討ち、長い源平の戦いに勝ったのじゃ。"},
  {year:"1185",title:"守護・地頭を置く",desc:"同じ1185年、義経をとらえる口実で、全国に守護・地頭を置く権利を朝廷に認めさせた。幕府の土台が固まった年よ。"},
  {year:"1189",title:"奥州合戦",desc:"1189年、義経をかくまった奥州藤原氏を大軍でほろぼした。これで天下を争う大きな相手はいなくなった。"},
  {year:"1190",title:"上洛",desc:"1190年、千騎の武士をひきいて京へのぼり、後白河法皇と何度も語りあった。武士のかしらの力を世に示した。"},
  {year:"1192",title:"征夷大将軍",desc:"1192年、ついに征夷大将軍となった。武士のかしらをあらわす位で、鎌倉幕府のしるしじゃ。"},
  {year:"1199",title:"死去",desc:"1199年、相模川の橋供養の帰りに体調をくずし、世を去った。享年53。武士の世の扉(とびら)を開いた一生であった。"}
];
let builtTimeline=false;
function buildTimeline(){
  const tl=document.getElementById('timeline');tl.innerHTML="";
  TIMELINE.forEach(it=>{
    const item=document.createElement('div');item.className='tl-item';
    const y=document.createElement('div');y.className='tl-year';y.textContent=it.year;
    const rail=document.createElement('div');rail.className='tl-rail';
    const dot=document.createElement('span');dot.className='tl-dot';rail.appendChild(dot);
    const body=document.createElement('div');body.className='tl-body';
    const tt=document.createElement('div');tt.className='tl-title';tt.textContent=it.title;
    body.appendChild(tt);
    item.append(y,rail,body);
    item.onclick=()=>{
      document.querySelectorAll('.tl-item').forEach(x=>x.classList.remove('active'));
      item.classList.add('active');
      speak(it.desc);
      window.scrollTo({top:0,behavior:'smooth'});
    };
    tl.appendChild(item);
  });
}

// ----- タブ切りかえ -----
const ZUKAN_INTRO="ここは『ずかん』じゃ。気になる人物やできごとの札(ふだ)をえらぶと、わたしが教えてしんぜよう。ぜんぶ集められるかな？";
const TL_INTRO="ここは『年表』じゃ。わたしの一生を年の順にならべてある。気になる出来事をえらぶと、くわしく語ってやろう。";
const panels={qa:document.getElementById('panel-qa'),quiz:document.getElementById('panel-quiz'),zukan:document.getElementById('panel-zukan'),timeline:document.getElementById('panel-timeline')};
const tabEls=document.querySelectorAll('.tab[data-tab]');
function switchTab(name){
  tabEls.forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  Object.keys(panels).forEach(k=>{panels[k].hidden=(k!==name);});
  if(name==='quiz'){ if(!quizStarted) startQuiz(); }
  else if(name==='zukan'){ if(!builtZukan){buildZukan();builtZukan=true;speak(ZUKAN_INTRO);} }
  else if(name==='timeline'){ if(!builtTimeline){buildTimeline();builtTimeline=true;speak(TL_INTRO);} }
}
tabEls.forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));

// 最初のあいさつ
speak(GREET);
